<svg viewBox="0 0 960 706" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#8a7c63" />
    </marker>
    <marker id="arrowink" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2c3a48" />
    </marker>
  </defs>

  <!-- paper background -->
  <rect x="0" y="0" width="960" height="706" fill="#efe4d1" />
  <rect x="10" y="10" width="940" height="686" rx="16" fill="none" stroke="#d8c9ab" stroke-width="1.5" />

  <!-- title -->
  <text x="44" y="54" font-size="25" font-weight="700" fill="#2c3a48">One emoji, four byte tokens, one streaming decision</text>
  <text x="44" y="82" font-size="14.5" fill="#6f6450">Byte-level BPE emits bytes, not characters. The face 🙂 (U+1F642) is the four bytes F0 9F 99 82, often split across tokens.</text>

  <!-- ============ BAND A ============ -->
  <rect x="44" y="104" width="872" height="226" rx="14" fill="#faf4e8" stroke="#2c3a48" stroke-width="1.5" />
  <text x="66" y="136" font-size="16" font-weight="700" fill="#c2452b">Path 1 · flush each token's bytes the moment it decodes</text>

  <!-- token chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- chip template repeated -->
    <g>
      <rect x="70" y="152" width="148" height="54" rx="9" fill="#f1e6d2" stroke="#2c3a48" stroke-width="1.3" />
      <text x="144" y="172" font-size="11.5" fill="#6f6450" text-anchor="middle" font-family="ui-sans-serif, sans-serif">token k+1</text>
      <text x="144" y="194" font-size="19" font-weight="700" fill="#2c3a48" text-anchor="middle">&lt;0xF0&gt;</text>
    </g>
    <g>
      <rect x="240" y="152" width="148" height="54" rx="9" fill="#f1e6d2" stroke="#2c3a48" stroke-width="1.3" />
      <text x="314" y="172" font-size="11.5" fill="#6f6450" text-anchor="middle" font-family="ui-sans-serif, sans-serif">token k+2</text>
      <text x="314" y="194" font-size="19" font-weight="700" fill="#2c3a48" text-anchor="middle">&lt;0x9F&gt;</text>
    </g>
    <g>
      <rect x="410" y="152" width="148" height="54" rx="9" fill="#f1e6d2" stroke="#2c3a48" stroke-width="1.3" />
      <text x="484" y="172" font-size="11.5" fill="#6f6450" text-anchor="middle" font-family="ui-sans-serif, sans-serif">token k+3</text>
      <text x="484" y="194" font-size="19" font-weight="700" fill="#2c3a48" text-anchor="middle">&lt;0x99&gt;</text>
    </g>
    <g>
      <rect x="580" y="152" width="148" height="54" rx="9" fill="#f1e6d2" stroke="#2c3a48" stroke-width="1.3" />
      <text x="654" y="172" font-size="11.5" fill="#6f6450" text-anchor="middle" font-family="ui-sans-serif, sans-serif">token k+4</text>
      <text x="654" y="194" font-size="19" font-weight="700" fill="#2c3a48" text-anchor="middle">&lt;0x82&gt;</text>
    </g>
  </g>

  <!-- arrow into output -->
  <line x1="744" y1="179" x2="772" y2="179" stroke="#8a7c63" stroke-width="2" marker-end="url(#arrow)" />
  <text x="790" y="166" font-size="11.5" fill="#6f6450">decode each</text>
  <text x="790" y="182" font-size="11.5" fill="#6f6450">token alone</text>

  <!-- output strip -->
  <rect x="70" y="240" width="658" height="64" rx="10" fill="#ffffff" stroke="#c2452b" stroke-width="1.5" />
  <text x="86" y="264" font-size="12.5" fill="#6f6450" font-family="ui-sans-serif, sans-serif">browser TextDecoder, byte by byte</text>
  <text x="86" y="292" font-size="22" font-weight="700" fill="#c2452b" font-family="ui-monospace, Menlo, monospace">&#xFFFD; &#xFFFD; &#xFFFD; &#xFFFD;</text>
  <text x="190" y="290" font-size="13" fill="#6f6450" font-family="ui-sans-serif, sans-serif">four lone bytes, each invalid UTF-8, each replaced</text>

  <!-- lost glyph -->
  <circle cx="800" cy="272" r="22" fill="#fbeae4" stroke="#c2452b" stroke-width="1.5" />
  <text x="800" y="280" font-size="22" font-weight="700" fill="#c2452b" text-anchor="middle">&#10007;</text>
  <text x="838" y="268" font-size="13.5" font-weight="700" fill="#c2452b">🙂 never</text>
  <text x="838" y="285" font-size="13.5" font-weight="700" fill="#c2452b">renders</text>

  <!-- ============ BAND B ============ -->
  <rect x="44" y="346" width="872" height="284" rx="14" fill="#faf4e8" stroke="#2c3a48" stroke-width="1.5" />
  <text x="66" y="378" font-size="16" font-weight="700" fill="#2f7d62">Path 2 · hold the incomplete tail until the codepoint closes</text>
  <text x="66" y="399" font-size="12.5" fill="#6f6450">zinc walks back over up to 3 trailing continuation bytes and flushes only to the last complete boundary, in lastCompleteUtf8End()</text>

  <!-- 4 step columns -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- step 1 -->
    <g>
      <rect x="66" y="414" width="150" height="36" rx="8" fill="#f1e6d2" stroke="#2c3a48" stroke-width="1.2" />
      <text x="141" y="438" font-size="15" font-weight="700" fill="#2c3a48" text-anchor="middle">+ &lt;0xF0&gt;</text>
      <line x1="141" y1="452" x2="141" y2="476" stroke="#2c3a48" stroke-width="1.6" marker-end="url(#arrowink)" />
      <rect x="66" y="480" width="36" height="36" rx="6" fill="#e7dcc6" stroke="#2c3a48" stroke-width="1.2" />
      <text x="84" y="504" font-size="14" font-weight="700" fill="#2c3a48" text-anchor="middle">F0</text>
      <text x="66" y="546" font-size="12.5" fill="#6f6450" font-family="ui-sans-serif, sans-serif">hold buffer: 1 byte</text>
      <text x="66" y="566" font-size="12.5" font-weight="700" fill="#8a7c63" font-family="ui-sans-serif, sans-serif">incomplete · emit 0</text>
    </g>
    <!-- step 2 -->
    <g>
      <rect x="278" y="414" width="150" height="36" rx="8" fill="#f1e6d2" stroke="#2c3a48" stroke-width="1.2" />
      <text x="353" y="438" font-size="15" font-weight="700" fill="#2c3a48" text-anchor="middle">+ &lt;0x9F&gt;</text>
      <line x1="353" y1="452" x2="353" y2="476" stroke="#2c3a48" stroke-width="1.6" marker-end="url(#arrowink)" />
      <rect x="278" y="480" width="36" height="36" rx="6" fill="#e7dcc6" stroke="#2c3a48" stroke-width="1.2" />
      <text x="296" y="504" font-size="14" font-weight="700" fill="#2c3a48" text-anchor="middle">F0</text>
      <rect x="318" y="480" width="36" height="36" rx="6" fill="#e7dcc6" stroke="#2c3a48" stroke-width="1.2" />
      <text x="336" y="504" font-size="14" font-weight="700" fill="#2c3a48" text-anchor="middle">9F</text>
      <text x="278" y="546" font-size="12.5" fill="#6f6450" font-family="ui-sans-serif, sans-serif">hold buffer: 2 bytes</text>
      <text x="278" y="566" font-size="12.5" font-weight="700" fill="#8a7c63" font-family="ui-sans-serif, sans-serif">incomplete · emit 0</text>
    </g>
    <!-- step 3 -->
    <g>
      <rect x="490" y="414" width="150" height="36" rx="8" fill="#f1e6d2" stroke="#2c3a48" stroke-width="1.2" />
      <text x="565" y="438" font-size="15" font-weight="700" fill="#2c3a48" text-anchor="middle">+ &lt;0x99&gt;</text>
      <line x1="565" y1="452" x2="565" y2="476" stroke="#2c3a48" stroke-width="1.6" marker-end="url(#arrowink)" />
      <rect x="490" y="480" width="36" height="36" rx="6" fill="#e7dcc6" stroke="#2c3a48" stroke-width="1.2" />
      <text x="508" y="504" font-size="14" font-weight="700" fill="#2c3a48" text-anchor="middle">F0</text>
      <rect x="530" y="480" width="36" height="36" rx="6" fill="#e7dcc6" stroke="#2c3a48" stroke-width="1.2" />
      <text x="548" y="504" font-size="14" font-weight="700" fill="#2c3a48" text-anchor="middle">9F</text>
      <rect x="570" y="480" width="36" height="36" rx="6" fill="#e7dcc6" stroke="#2c3a48" stroke-width="1.2" />
      <text x="588" y="504" font-size="14" font-weight="700" fill="#2c3a48" text-anchor="middle">99</text>
      <text x="490" y="546" font-size="12.5" fill="#6f6450" font-family="ui-sans-serif, sans-serif">hold buffer: 3 bytes</text>
      <text x="490" y="566" font-size="12.5" font-weight="700" fill="#8a7c63" font-family="ui-sans-serif, sans-serif">incomplete · emit 0</text>
    </g>
    <!-- step 4 -->
    <g>
      <rect x="702" y="414" width="150" height="36" rx="8" fill="#e3f0e8" stroke="#2f7d62" stroke-width="1.4" />
      <text x="777" y="438" font-size="15" font-weight="700" fill="#2f7d62" text-anchor="middle">+ &lt;0x82&gt;</text>
      <line x1="777" y1="452" x2="777" y2="476" stroke="#2f7d62" stroke-width="1.6" marker-end="url(#arrowink)" />
      <rect x="702" y="480" width="36" height="36" rx="6" fill="#cfe7da" stroke="#2f7d62" stroke-width="1.3" />
      <text x="720" y="504" font-size="14" font-weight="700" fill="#1f6b50" text-anchor="middle">F0</text>
      <rect x="742" y="480" width="36" height="36" rx="6" fill="#cfe7da" stroke="#2f7d62" stroke-width="1.3" />
      <text x="760" y="504" font-size="14" font-weight="700" fill="#1f6b50" text-anchor="middle">9F</text>
      <rect x="782" y="480" width="36" height="36" rx="6" fill="#cfe7da" stroke="#2f7d62" stroke-width="1.3" />
      <text x="800" y="504" font-size="14" font-weight="700" fill="#1f6b50" text-anchor="middle">99</text>
      <rect x="822" y="480" width="36" height="36" rx="6" fill="#cfe7da" stroke="#2f7d62" stroke-width="1.3" />
      <text x="840" y="504" font-size="14" font-weight="700" fill="#1f6b50" text-anchor="middle">82</text>
      <text x="702" y="546" font-size="12.5" fill="#6f6450" font-family="ui-sans-serif, sans-serif">complete 4-byte run</text>
      <text x="702" y="566" font-size="12.5" font-weight="700" fill="#2f7d62" font-family="ui-sans-serif, sans-serif">flush 🙂 · emit 4</text>
    </g>
  </g>

  <!-- time arrow across the bottom of band B -->
  <line x1="66" y1="592" x2="852" y2="592" stroke="#8a7c63" stroke-width="1.4" stroke-dasharray="2 5" marker-end="url(#arrow)" />
  <text x="66" y="610" font-size="11.5" fill="#8a7c63" font-family="ui-sans-serif, sans-serif">decode steps in order →</text>
  <text x="852" y="610" font-size="13" font-weight="700" fill="#2f7d62" text-anchor="end" font-family="ui-sans-serif, sans-serif">one clean 🙂 on the wire</text>

  <!-- ============ FOOTER LEGEND ============ -->
  <g font-family="ui-sans-serif, sans-serif">
    <rect x="44" y="650" width="15" height="15" rx="3" fill="#e7dcc6" stroke="#2c3a48" stroke-width="1.1" />
    <text x="65" y="662" font-size="12" fill="#6f6450">byte held in buffer</text>
    <rect x="196" y="650" width="15" height="15" rx="3" fill="#cfe7da" stroke="#2f7d62" stroke-width="1.2" />
    <text x="217" y="662" font-size="12" fill="#6f6450">completed codepoint, flushed</text>
    <rect x="404" y="650" width="15" height="15" rx="3" fill="#fbeae4" stroke="#c2452b" stroke-width="1.2" />
    <text x="425" y="662" font-size="12" fill="#6f6450">U+FFFD replacement character</text>
    <text x="44" y="690" font-size="11" fill="#9c8e74">UTF-8 byte structure per RFC 3629; the &lt;0xNN&gt; byte-fallback token format follows llama.cpp. Layout is schematic.</text>
  </g>
</svg>
