<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 600" role="img" aria-labelledby="title desc" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial">
  <title id="title">Draft-model speculative decode vs MTP-head speculative decode on Qwen3</title>
  <desc id="desc">A two-panel architectural comparison. The left panel shows the April 28 draft-model speculative decoding picture on Qwen 3.6 35B-A3B: a small 0.8B draft model emits four candidate tokens autoregressively, the 35B-A3B verifier checks them in parallel, one is rejected, and a red curved arrow shows a 1.8 gigabyte gated DeltaNet state rewind on the rejected token. The label below reads cost ratio c equals 0.30, acceptance alpha equals 0.55, gamma equals 4, Leviathan speedup equals 0.96 times. The right panel shows the May 8 MTP-head picture: a single 48-layer Qwen3 trunk feeds its last hidden state into a one-layer MTP head drawn as a dashed border, the head emits three candidate tokens that the same trunk verifies in one batched forward pass, and a small state ring next to the trunk holds per-token gated DeltaNet intermediates so only the rejected suffix is rolled back. The label below reads cost ratio c equals 0.04, acceptance alpha equals 0.83, gamma equals 3, Leviathan speedup equals 2.5 times. A header at the top reads two speculative decode shapes for Qwen3 with a subhead explaining the cost-ratio shift. A footer notes that the MTP path is opt-in via spec-type mtp in llama.cpp PR 22673 and qwen3 next mtp in vLLM.</desc>

  <defs>
    <linearGradient id="bgFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="draftFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4a261"/>
      <stop offset="100%" stop-color="#c97f3a"/>
    </linearGradient>
    <linearGradient id="verifierFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3eb1c8"/>
      <stop offset="100%" stop-color="#2a8aa0"/>
    </linearGradient>
    <linearGradient id="mtpFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c63d6"/>
    </linearGradient>
    <linearGradient id="badBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e85d75"/>
      <stop offset="100%" stop-color="#b33950"/>
    </linearGradient>
    <linearGradient id="goodBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5dbb89"/>
      <stop offset="100%" stop-color="#3f9b6b"/>
    </linearGradient>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e85d75"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5dbb89"/>
    </marker>
    <marker id="arrowGrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8ea0b8"/>
    </marker>
  </defs>

  <rect width="940" height="600" fill="url(#bgFade)"/>

  <!-- Header -->
  <text x="36" y="34" fill="#e8edf5" font-size="19" font-weight="700">Two speculative decode shapes for Qwen3 on RDNA4</text>
  <text x="36" y="54" fill="#8ea0b8" font-size="12.5">Same model family, different draft. The cost ratio collapses by an order of magnitude when the draft is one MTP layer.</text>

  <!-- Vertical divider -->
  <line x1="470" y1="80" x2="470" y2="540" stroke="#1d2b48" stroke-width="1"/>

  <!-- ===================== LEFT PANEL: Draft model ===================== -->
  <text x="36" y="92" fill="#c8d1e0" font-size="13" font-weight="700">Draft-model spec decode (Apr 28 picture)</text>
  <text x="36" y="110" fill="#8ea0b8" font-size="11">Vocab-matched 0.8B Qwen draft, 35B-A3B verifier, Leviathan loop</text>

  <!-- Draft block -->
  <g transform="translate(56, 130)">
    <rect width="170" height="44" rx="6" fill="url(#draftFill)" opacity="0.92"/>
    <text x="85" y="20" fill="#1f1208" font-size="12" font-weight="700" text-anchor="middle">0.8B vocab-matched draft</text>
    <text x="85" y="36" fill="#1f1208" font-size="10.5" text-anchor="middle">0.36 GB active weights · γ = 4 forward passes</text>
  </g>

  <!-- 4 candidate tokens -->
  <g transform="translate(56, 188)">
    <text x="0" y="-3" fill="#8ea0b8" font-size="10.5">candidate tokens</text>
    <g>
      <rect x="0" y="0" width="34" height="22" rx="3" fill="#5dbb89" opacity="0.85"/>
      <text x="17" y="15" fill="#0a1020" font-size="11" font-weight="600" text-anchor="middle">t₁ ✓</text>
    </g>
    <g transform="translate(40,0)">
      <rect width="34" height="22" rx="3" fill="#5dbb89" opacity="0.85"/>
      <text x="17" y="15" fill="#0a1020" font-size="11" font-weight="600" text-anchor="middle">t₂ ✓</text>
    </g>
    <g transform="translate(80,0)">
      <rect width="34" height="22" rx="3" fill="#5dbb89" opacity="0.85"/>
      <text x="17" y="15" fill="#0a1020" font-size="11" font-weight="600" text-anchor="middle">t₃ ✓</text>
    </g>
    <g transform="translate(120,0)">
      <rect width="34" height="22" rx="3" fill="#e85d75" opacity="0.9"/>
      <text x="17" y="15" fill="#160505" font-size="11" font-weight="600" text-anchor="middle">t₄ ✗</text>
    </g>
  </g>

  <!-- Arrow draft -> verifier -->
  <line x1="141" y1="216" x2="141" y2="248" stroke="#8ea0b8" stroke-width="1.4" marker-end="url(#arrowGrey)"/>

  <!-- Verifier block -->
  <g transform="translate(36, 254)">
    <rect width="210" height="86" rx="6" fill="url(#verifierFill)" opacity="0.92"/>
    <text x="105" y="20" fill="#062b34" font-size="12" font-weight="700" text-anchor="middle">35B-A3B verifier (hybrid)</text>
    <text x="105" y="36" fill="#062b34" font-size="10.5" text-anchor="middle">2.0 GB active weights per step</text>
    <text x="105" y="50" fill="#062b34" font-size="10.5" text-anchor="middle">half layers gated DeltaNet</text>
    <!-- mini layer stack -->
    <g transform="translate(20, 58)">
      <rect width="28" height="6" fill="#7c63d6"/>
      <rect x="32" y="0" width="28" height="6" fill="#0a8da7"/>
      <rect x="64" y="0" width="28" height="6" fill="#7c63d6"/>
      <rect x="96" y="0" width="28" height="6" fill="#0a8da7"/>
      <rect x="128" y="0" width="28" height="6" fill="#7c63d6"/>
      <rect x="160" y="0" width="10" height="6" fill="#0a8da7"/>
    </g>
    <text x="105" y="78" fill="#062b34" font-size="9.5" text-anchor="middle">linear · attn · linear · attn · linear · attn</text>
  </g>

  <!-- SSM rewind arrow (red, big) -->
  <path d="M 246,300 C 360,300 360,200 270,200" fill="none" stroke="#e85d75" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="370" y="246" fill="#e85d75" font-size="11" font-weight="700">SSM rewind tax</text>
  <text x="370" y="262" fill="#e85d75" font-size="10">discard 1.8 GB delta-net</text>
  <text x="370" y="276" fill="#e85d75" font-size="10">state on every reject</text>

  <!-- Cost panel -->
  <g transform="translate(36, 374)">
    <rect width="410" height="138" rx="8" fill="#0a1020" stroke="#1d2b48" stroke-width="1"/>
    <text x="14" y="22" fill="#c8d1e0" font-size="12" font-weight="700">Leviathan speedup</text>
    <text x="14" y="44" fill="#8ea0b8" font-size="11">α = 0.55 (cross-family draft)</text>
    <text x="14" y="60" fill="#8ea0b8" font-size="11">c = 0.30 (3B active + SSM rewind)</text>
    <text x="14" y="76" fill="#8ea0b8" font-size="11">γ = 4 lookahead</text>
    <text x="14" y="100" fill="#e85d75" font-size="22" font-weight="700">0.96×</text>
    <text x="100" y="100" fill="#e85d75" font-size="11">net slowdown vs greedy</text>
    <!-- bar -->
    <rect x="14" y="112" width="384" height="10" rx="3" fill="#1d2b48"/>
    <rect x="14" y="112" width="92" height="10" rx="3" fill="url(#badBar)"/>
    <text x="116" y="121" fill="#e85d75" font-size="10">0.96× of baseline tok/s</text>
  </g>

  <!-- ===================== RIGHT PANEL: MTP head ===================== -->
  <text x="500" y="92" fill="#c8d1e0" font-size="13" font-weight="700">MTP-head spec decode (May 8 picture)</text>
  <text x="500" y="110" fill="#8ea0b8" font-size="11">One-layer MTP block on shared trunk, draft-tokens via verifier features</text>

  <!-- Trunk + MTP head -->
  <g transform="translate(516, 130)">
    <rect width="200" height="86" rx="6" fill="url(#verifierFill)" opacity="0.92"/>
    <text x="100" y="20" fill="#062b34" font-size="12" font-weight="700" text-anchor="middle">Qwen3 48-layer trunk</text>
    <text x="100" y="36" fill="#062b34" font-size="10.5" text-anchor="middle">verifier &amp; feature source</text>
    <!-- mini layer stack -->
    <g transform="translate(20, 50)">
      <rect width="22" height="6" fill="#7c63d6"/>
      <rect x="26" y="0" width="22" height="6" fill="#7c63d6"/>
      <rect x="52" y="0" width="22" height="6" fill="#7c63d6"/>
      <rect x="78" y="0" width="22" height="6" fill="#0a8da7"/>
      <rect x="104" y="0" width="22" height="6" fill="#7c63d6"/>
      <rect x="130" y="0" width="22" height="6" fill="#7c63d6"/>
    </g>
    <text x="100" y="76" fill="#062b34" font-size="9.5" text-anchor="middle">3:1 hybrid · GDN intermediates kept per token</text>
  </g>

  <!-- Hidden-state arrow trunk -> mtp -->
  <line x1="616" y1="220" x2="616" y2="244" stroke="#8ea0b8" stroke-width="1.4" marker-end="url(#arrowGrey)"/>
  <text x="624" y="238" fill="#8ea0b8" font-size="10">last-layer h</text>

  <!-- MTP head -->
  <g transform="translate(536, 250)">
    <rect width="160" height="42" rx="6" fill="url(#mtpFill)" opacity="0.92" stroke="#c4b5fd" stroke-width="1.4" stroke-dasharray="4,3"/>
    <text x="80" y="18" fill="#1a1230" font-size="12" font-weight="700" text-anchor="middle">MTP head · 1 layer</text>
    <text x="80" y="34" fill="#1a1230" font-size="10.5" text-anchor="middle">~ 0.43 GB · trained at pretraining time</text>
  </g>

  <!-- 3 candidate tokens (MTP) -->
  <g transform="translate(534, 312)">
    <text x="0" y="-3" fill="#8ea0b8" font-size="10.5">draft tokens</text>
    <g>
      <rect x="0" y="0" width="34" height="22" rx="3" fill="#5dbb89" opacity="0.85"/>
      <text x="17" y="15" fill="#0a1020" font-size="11" font-weight="600" text-anchor="middle">t₁ ✓</text>
    </g>
    <g transform="translate(40,0)">
      <rect width="34" height="22" rx="3" fill="#5dbb89" opacity="0.85"/>
      <text x="17" y="15" fill="#0a1020" font-size="11" font-weight="600" text-anchor="middle">t₂ ✓</text>
    </g>
    <g transform="translate(80,0)">
      <rect width="34" height="22" rx="3" fill="#5dbb89" opacity="0.85"/>
      <text x="17" y="15" fill="#0a1020" font-size="11" font-weight="600" text-anchor="middle">t₃ ✓</text>
    </g>
  </g>

  <!-- State ring -->
  <g transform="translate(740, 246)">
    <circle cx="40" cy="22" r="22" fill="none" stroke="#a78bfa" stroke-width="1.4" stroke-dasharray="3,3"/>
    <text x="40" y="26" fill="#c4b5fd" font-size="11" font-weight="700" text-anchor="middle">S₁ S₂ S₃</text>
    <text x="40" y="60" fill="#8ea0b8" font-size="9.5" text-anchor="middle">per-token GDN ring</text>
    <text x="40" y="73" fill="#8ea0b8" font-size="9.5" text-anchor="middle">partial rollback only</text>
  </g>

  <!-- Cost panel right -->
  <g transform="translate(500, 374)">
    <rect width="410" height="138" rx="8" fill="#0a1020" stroke="#1d2b48" stroke-width="1"/>
    <text x="14" y="22" fill="#c8d1e0" font-size="12" font-weight="700">Leviathan speedup</text>
    <text x="14" y="44" fill="#8ea0b8" font-size="11">α = 0.83 (hidden-state aligned head)</text>
    <text x="14" y="60" fill="#8ea0b8" font-size="11">c = 0.04 (one layer, no rewind)</text>
    <text x="14" y="76" fill="#8ea0b8" font-size="11">γ = 3 lookahead</text>
    <text x="14" y="100" fill="#5dbb89" font-size="22" font-weight="700">2.5×</text>
    <text x="100" y="100" fill="#5dbb89" font-size="11">measured on Qwen3.6 27B (PR 22673)</text>
    <!-- bar -->
    <rect x="14" y="112" width="384" height="10" rx="3" fill="#1d2b48"/>
    <rect x="14" y="112" width="240" height="10" rx="3" fill="url(#goodBar)"/>
    <text x="262" y="121" fill="#5dbb89" font-size="10">2.5× baseline tok/s</text>
  </g>

  <!-- Footer -->
  <text x="36" y="558" fill="#8ea0b8" font-size="11">opt-in via <tspan fill="#c8d1e0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">--spec-type mtp</tspan> in llama.cpp PR 22673 (May 4) and <tspan fill="#c8d1e0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">qwen3_next_mtp</tspan> in vLLM</text>
  <text x="36" y="578" fill="#8ea0b8" font-size="11">depends on PR 22400 partial GDN rollback (Apr 26) — Vulkan path on RDNA4 still produces garbage tokens (issue thread)</text>
</svg>
