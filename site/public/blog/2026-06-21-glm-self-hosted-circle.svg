<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700" role="img" aria-labelledby="title desc">
  <title id="title">The closed circle for local inference</title>
  <desc id="desc">A four-stage clockwise cycle around a center labeled self-hosted self-improvement. GLM 5.2 open weights are served by the local inference engine, the loop tunes the engine's kernels, which produces a faster engine, which in turn serves the model that drives the loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcfbf7"/>
      <stop offset="100%" stop-color="#eef2f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#738496"/>
    </marker>
    <style>
      .title { font: 700 36px Georgia, serif; fill: #14213d; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #5b6776; }
      .node { stroke-width: 2; }
      .node-a { fill: #fdeee2; stroke: #e0a86a; }
      .node-b { fill: #eef5ff; stroke: #97b3da; }
      .node-c { fill: #f1f8f1; stroke: #b9d8bd; }
      .node-d { fill: #fff4f0; stroke: #efc0b5; }
      .step { font: 700 20px Arial, sans-serif; fill: #14213d; text-anchor: middle; }
      .sub { font: 400 14px Arial, sans-serif; fill: #5b6776; text-anchor: middle; }
      .flow { fill: none; stroke: #738496; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
      .center { fill: #17324d; }
      .center-label { font: 700 13px Arial, sans-serif; fill: #a8c0d7; letter-spacing: 0.10em; text-anchor: middle; }
      .center-step { font: 700 24px Arial, sans-serif; fill: #ffffff; text-anchor: middle; }
      .center-copy { font: 400 15px Arial, sans-serif; fill: #d7e1ea; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1100" height="700" fill="url(#bg)"/>

  <g transform="translate(64 52)">
    <text class="title">The closed circle for local inference</text>
    <text class="subtitle" x="0" y="30">An open-weight model can optimize — and run on — the very engine it tunes.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="node node-a" x="400" y="148" width="300" height="86" rx="20"/>
    <rect class="node node-b" x="724" y="378" width="300" height="86" rx="20"/>
    <rect class="node node-c" x="400" y="568" width="300" height="86" rx="20"/>
    <rect class="node node-d" x="76"  y="378" width="300" height="86" rx="20"/>
  </g>

  <text class="step" x="550" y="186">GLM 5.2 &#183; open weights</text>
  <text class="sub"  x="550" y="210">the swappable loop brain</text>

  <text class="step" x="874" y="416">Served by the local engine</text>
  <text class="sub"  x="874" y="440">no remote API dependency</text>

  <text class="step" x="550" y="606">Loop tunes the kernels</text>
  <text class="sub"  x="550" y="630">Zig &#183; GLSL &#183; CUDA, verified wins</text>

  <text class="step" x="226" y="416">Faster engine</text>
  <text class="sub"  x="226" y="440">more tok/s for every tenant</text>

  <path class="flow" d="M712 214 C812 250 868 308 884 372"/>
  <path class="flow" d="M884 470 C868 534 812 592 712 600"/>
  <path class="flow" d="M388 600 C288 592 232 534 216 470"/>
  <path class="flow" d="M216 372 C232 308 288 250 388 214"/>

  <circle class="center" cx="550" cy="411" r="118" filter="url(#shadow)"/>
  <text class="center-label" x="550" y="382">THE PAYOFF</text>
  <text class="center-step"  x="550" y="414">Self-hosted</text>
  <text class="center-copy"  x="550" y="442">self-improvement,</text>
  <text class="center-copy"  x="550" y="462">on your hardware</text>
</svg>
