<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Gemma 4 performance shape in the June 1 ZINC dashboard</title>
  <desc id="desc">A grouped bar chart showing ZINC as percent of llama.cpp for Gemma 4 dense and MoE rows on RDNA and Metal. Decode is close on RDNA and Metal dense, while prefill is far behind except for Metal dense.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="700" rx="22" fill="url(#bg)"/>
  <g transform="translate(70 58)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700">Gemma 4 is not one performance story</text>
    <text x="0" y="38" fill="#b9c4d6" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">ZINC as percent of llama.cpp in the June 1 dashboard. Decode is near. Prefill decides the gap.</text>
  </g>

  <g transform="translate(90 135)">
    <line x1="0" x2="1010" y1="410" y2="410" stroke="#40506b" stroke-width="1"/>
    <line x1="0" x2="1010" y1="290" y2="290" stroke="#263449" stroke-width="1"/>
    <line x1="0" x2="1010" y1="170" y2="170" stroke="#263449" stroke-width="1"/>
    <line x1="0" x2="1010" y1="50" y2="50" stroke="#263449" stroke-width="1"/>
    <line x1="0" x2="1010" y1="170" y2="170" stroke="#7dd3fc" stroke-width="2" stroke-dasharray="8 9" opacity="0.8"/>
    <text x="1018" y="176" fill="#7dd3fc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">100%</text>
    <text x="-8" y="414" text-anchor="end" fill="#8fa0bb" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">0</text>
    <text x="-8" y="294" text-anchor="end" fill="#8fa0bb" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">50</text>
    <text x="-8" y="174" text-anchor="end" fill="#8fa0bb" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">100</text>
    <text x="-8" y="54" text-anchor="end" fill="#8fa0bb" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">150</text>

    <g transform="translate(55 0)" filter="url(#softShadow)">
      <rect x="0" y="198.8" width="58" height="211.2" rx="8" fill="#34d399"/>
      <rect x="70" y="367.0" width="58" height="43.0" rx="8" fill="#f59e0b"/>
      <text x="29" y="190" text-anchor="middle" fill="#d1fae5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">88%</text>
      <text x="99" y="359" text-anchor="middle" fill="#fde68a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">18%</text>
    </g>
    <text x="119" y="455" text-anchor="middle" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">RDNA MoE</text>
    <text x="119" y="480" text-anchor="middle" fill="#9fb0c9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">26B-A4B</text>

    <g transform="translate(300 0)" filter="url(#softShadow)">
      <rect x="0" y="202.9" width="58" height="207.1" rx="8" fill="#34d399"/>
      <rect x="70" y="360.6" width="58" height="49.4" rx="8" fill="#f59e0b"/>
      <text x="29" y="194" text-anchor="middle" fill="#d1fae5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">86%</text>
      <text x="99" y="352" text-anchor="middle" fill="#fde68a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">21%</text>
    </g>
    <text x="364" y="455" text-anchor="middle" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">RDNA Dense</text>
    <text x="364" y="480" text-anchor="middle" fill="#9fb0c9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">31B</text>

    <g transform="translate(545 0)" filter="url(#softShadow)">
      <rect x="0" y="328.6" width="58" height="81.4" rx="8" fill="#34d399"/>
      <rect x="70" y="387.7" width="58" height="22.3" rx="8" fill="#f59e0b"/>
      <text x="29" y="320" text-anchor="middle" fill="#d1fae5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">34%</text>
      <text x="99" y="379" text-anchor="middle" fill="#fde68a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">9%</text>
    </g>
    <text x="609" y="455" text-anchor="middle" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">Metal MoE</text>
    <text x="609" y="480" text-anchor="middle" fill="#9fb0c9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">26B-A4B</text>

    <g transform="translate(790 0)" filter="url(#softShadow)">
      <rect x="0" y="184.9" width="58" height="225.1" rx="8" fill="#34d399"/>
      <rect x="70" y="33.2" width="58" height="376.8" rx="8" fill="#f59e0b"/>
      <text x="29" y="176" text-anchor="middle" fill="#d1fae5" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">94%</text>
      <text x="99" y="25" text-anchor="middle" fill="#fde68a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">157%</text>
    </g>
    <text x="854" y="455" text-anchor="middle" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">Metal Dense</text>
    <text x="854" y="480" text-anchor="middle" fill="#9fb0c9" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13">31B</text>
  </g>

  <g transform="translate(90 632)">
    <rect x="0" y="-15" width="18" height="18" rx="4" fill="#34d399"/>
    <text x="28" y="0" fill="#dbe6f3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Decode</text>
    <rect x="120" y="-15" width="18" height="18" rx="4" fill="#f59e0b"/>
    <text x="148" y="0" fill="#dbe6f3" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Prefill</text>
    <text x="360" y="0" fill="#8fa0bb" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Numbers are medians from site/src/data/zinc-performance.json, generated June 1, 2026.</text>
  </g>
</svg>
