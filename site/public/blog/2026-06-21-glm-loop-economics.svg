<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="580" viewBox="0 0 1240 580" role="img" aria-labelledby="title desc">
  <title id="title">Why the model is an economics decision for loops</title>
  <desc id="desc">The cost to run a loop equals tokens per cycle times number of cycles times price per token, with price per token highlighted as the lever. The left panel shows that a single cycle is token-heavy and mostly fixed, with a stacked bar of repo and source context, carried memory, model reasoning, and diff plus analysis. The right panel shows a rising staircase of regimes unlocked as price per token drops: run occasionally, then leave it running every night, then fan out parallel loops.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcfbf7"/>
      <stop offset="100%" stop-color="#eef2f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#738496"/>
    </marker>
    <style>
      .title { font: 700 38px Georgia, serif; fill: #14213d; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #5b6776; }
      .eq { font: 700 24px Georgia, serif; fill: #14213d; text-anchor: middle; }
      .eq-dim { fill: #6b7686; }
      .eq-hot { fill: #c1556d; }
      .head { font: 700 19px Arial, sans-serif; fill: #14213d; }
      .seg-label { font: 600 14px Arial, sans-serif; fill: #36414f; }
      .cap { font: 400 14px Arial, sans-serif; fill: #5b6776; }
      .step-label { font: 700 17px Arial, sans-serif; fill: #14213d; text-anchor: middle; }
      .step-sub { font: 400 13px Arial, sans-serif; fill: #5b6776; text-anchor: middle; }
      .axis { fill: none; stroke: #738496; stroke-width: 3.5; stroke-linecap: round; marker-end: url(#arrow); }
      .axis-label { font: 700 13px Arial, sans-serif; fill: #4a7b58; letter-spacing: 0.04em; }
    </style>
  </defs>

  <rect width="1240" height="580" fill="url(#bg)"/>

  <g transform="translate(60 54)">
    <text class="title">The model choice is an economics decision</text>
    <text class="subtitle" x="0" y="32">A loop only pays off if you can afford to run it — over, and over, and over.</text>
  </g>

  <text class="eq" x="620" y="150">loop cost  =  tokens/cycle  <tspan class="eq-dim">&#215;</tspan>  cycles  <tspan class="eq-dim">&#215;</tspan>  <tspan class="eq-hot">price/token</tspan></text>
  <text class="cap" x="620" y="176" text-anchor="middle">The first two terms are fixed by the work. The lever you actually choose is the last one.</text>

  <!-- Left panel: one cycle is token-heavy -->
  <g filter="url(#shadow)">
    <rect x="70" y="214" width="430" height="306" rx="22" fill="#fffdf9" stroke="#e4ddcd"/>
  </g>
  <text class="head" x="100" y="252">One cycle is token-heavy</text>

  <!-- stacked bar bottom y=486, top y=276, width 96, x=130 -->
  <rect x="130" y="406" width="96" height="80" fill="#2f5c84"/>
  <rect x="130" y="356" width="96" height="50" fill="#3f7faa"/>
  <rect x="130" y="316" width="96" height="40" fill="#6aa6c9"/>
  <rect x="130" y="286" width="96" height="30" fill="#a8cfe2"/>
  <rect x="130" y="286" width="96" height="200" fill="none" stroke="#2b4257" stroke-width="1.5"/>

  <text class="seg-label" x="244" y="451">repo &amp; source context</text>
  <text class="seg-label" x="244" y="385">carried memory (history)</text>
  <text class="seg-label" x="244" y="340">model reasoning</text>
  <text class="seg-label" x="244" y="305">diff + analysis</text>
  <text class="cap" x="100" y="508">&#8230; and it is mostly fixed — every cycle pays it again.</text>

  <!-- Right panel: regime staircase -->
  <g filter="url(#shadow)">
    <rect x="540" y="214" width="630" height="306" rx="22" fill="#f6faf6" stroke="#cfe3d0"/>
  </g>
  <text class="head" x="572" y="252">So price/token decides the regime</text>

  <!-- staircase, baseline y=488 -->
  <rect x="588"  y="416" width="150" height="72"  rx="12" fill="#fffdf9" stroke="#d7cfbe"/>
  <text class="step-label" x="663" y="448">Run occasionally</text>
  <text class="step-sub"   x="663" y="470">when you remember to</text>

  <rect x="758"  y="356" width="150" height="132" rx="12" fill="#eef5ff" stroke="#97b3da"/>
  <text class="step-label" x="833" y="408">Leave it running</text>
  <text class="step-sub"   x="833" y="430">every night</text>

  <rect x="928"  y="288" width="184" height="200" rx="12" fill="#e8f5ea" stroke="#8cc596"/>
  <text class="step-label" x="1020" y="356">Fan out parallel</text>
  <text class="step-label" x="1020" y="378">loops</text>
  <text class="step-sub"   x="1020" y="400">every subsystem at once</text>

  <path class="axis" d="M584 404 L1118 268"/>
  <text class="axis-label" x="690" y="540">cheaper, capable, open model  &#8594;  climb the stairs</text>
</svg>
