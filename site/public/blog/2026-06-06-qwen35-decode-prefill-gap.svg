<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1724"/>
      <stop offset="1" stop-color="#18251f"/>
    </linearGradient>
    <linearGradient id="zinc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38d7ff"/>
      <stop offset="1" stop-color="#58e6a9"/>
    </linearGradient>
    <linearGradient id="llama" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a7b3c2"/>
      <stop offset="1" stop-color="#d2d8e3"/>
    </linearGradient>
    <style>
      .title { fill: #f6fbff; font-size: 32px; font-weight: 780; }
      .subtitle { fill: #aebdcc; font-size: 15px; }
      .panelTitle { fill: #f6fbff; font-size: 20px; font-weight: 760; }
      .small { fill: #aebdcc; font-size: 13px; }
      .axis { fill: #8595a8; font-size: 12px; }
      .label { fill: #e8f1f8; font-size: 15px; font-weight: 720; }
      .value { fill: #f6fbff; font-size: 16px; font-weight: 760; }
      .pillText { fill: #07111d; font-size: 20px; font-weight: 820; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="56" y="62" class="title">Qwen 35B is a decode win and a prefill gap</text>
  <text x="56" y="94" class="subtitle">June 1 dashboard row: ZINC versus llama.cpp on the same Qwen3.6 35B-A3B Q4_K_XL model file, Radeon AI PRO R9700.</text>

  <g transform="translate(56,132)">
    <rect width="1088" height="228" rx="8" fill="#111c2a" stroke="#344458"/>
    <text x="28" y="42" class="panelTitle">Decode: ZINC is ahead</text>
    <text x="28" y="70" class="small">Hot one-token answer loop after the prompt is loaded.</text>

    <g transform="translate(310,72)">
      <text x="0" y="-16" class="axis">0</text>
      <text x="214" y="-16" class="axis">50</text>
      <text x="445" y="-16" class="axis">100</text>
      <text x="625" y="-16" class="axis">140 tok/s</text>
      <line x1="0" y1="0" x2="650" y2="0" stroke="#263548"/>
      <line x1="0" y1="0" x2="0" y2="110" stroke="#263548"/>
      <line x1="232" y1="0" x2="232" y2="110" stroke="#263548" stroke-dasharray="4 5"/>
      <line x1="464" y1="0" x2="464" y2="110" stroke="#263548" stroke-dasharray="4 5"/>

      <text x="-112" y="34" class="label">ZINC</text>
      <rect x="0" y="14" width="594" height="36" rx="5" fill="url(#zinc)"/>
      <text x="610" y="38" class="value">127.9 tok/s</text>

      <text x="-112" y="88" class="label">llama.cpp</text>
      <rect x="0" y="68" width="504" height="36" rx="5" fill="url(#llama)"/>
      <text x="520" y="92" class="value">108.5 tok/s</text>
    </g>

    <g transform="translate(874,118)">
      <rect x="0" y="0" width="162" height="70" rx="7" fill="#58e6a9"/>
      <text x="81" y="36" class="pillText">117.9%</text>
      <text x="81" y="92" fill="#aebdcc" font-size="13" text-anchor="middle">of llama.cpp</text>
    </g>
  </g>

  <g transform="translate(56,400)">
    <rect width="1088" height="228" rx="8" fill="#151f2a" stroke="#36485a"/>
    <text x="28" y="42" class="panelTitle">Prefill: the hybrid prompt path still trails</text>
    <text x="28" y="70" class="small">Prompt ingestion before generation starts; this is where MoE routing and SSM state dominate.</text>

    <g transform="translate(310,72)">
      <text x="0" y="-16" class="axis">0</text>
      <text x="150" y="-16" class="axis">100</text>
      <text x="305" y="-16" class="axis">200</text>
      <text x="460" y="-16" class="axis">300</text>
      <text x="619" y="-16" class="axis">420 tok/s</text>
      <line x1="0" y1="0" x2="650" y2="0" stroke="#263548"/>
      <line x1="0" y1="0" x2="0" y2="110" stroke="#263548"/>
      <line x1="155" y1="0" x2="155" y2="110" stroke="#263548" stroke-dasharray="4 5"/>
      <line x1="310" y1="0" x2="310" y2="110" stroke="#263548" stroke-dasharray="4 5"/>
      <line x1="464" y1="0" x2="464" y2="110" stroke="#263548" stroke-dasharray="4 5"/>

      <text x="-112" y="34" class="label">ZINC</text>
      <rect x="0" y="14" width="239" height="36" rx="5" fill="url(#zinc)"/>
      <text x="255" y="38" class="value">154.27 tok/s</text>

      <text x="-112" y="88" class="label">llama.cpp</text>
      <rect x="0" y="68" width="617" height="36" rx="5" fill="url(#llama)"/>
      <text x="633" y="92" class="value">398.82 tok/s</text>
    </g>

    <g transform="translate(874,118)">
      <rect x="0" y="0" width="162" height="70" rx="7" fill="#ff8f70"/>
      <text x="81" y="36" class="pillText">38.7%</text>
      <text x="81" y="92" fill="#aebdcc" font-size="13" text-anchor="middle">of llama.cpp</text>
    </g>
  </g>

  <text x="56" y="680" fill="#8fa1b4" font-size="12">The same model can be a decode success and a prefill backlog. That is why the post separates prompt ingestion from token generation.</text>
</svg>
